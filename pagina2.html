<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacker Simulator - Terminal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="matrix"></canvas>

    <header>
        <h1>Terminal Hacker</h1>
        <p>Digite comandos ou copie manualmente os códigos do lado.</p>
    </header>

    <div id="container">
        <!-- Terminal flutuante -->
        <div id="terminal">
            <div id="output"></div>
            <input type="text" id="input" placeholder="Digite um comando...">
        </div>

        <!-- Códigos para copiar -->
        <div id="codes">
            <h3>Códigos para copiar e experimentar:</h3>
            <pre>$ echo "Hello World"</pre>
            <pre>$ date</pre>
            <pre>$ whoami</pre>
            <pre>$ pwd</pre>
            <pre>$ uptime</pre>
            <pre>$ dance</pre>
            <pre>$ attack simulate</pre>
            <pre>$ matrix</pre>
            <pre>$ clear</pre>
        </div>
    </div>

    <script>
        let matrixColor = "#00FFFF"; // azul
    </script>
    <script src="matrix.js"></script>
    <script src="terminal.js"></script>
</body>
</html>
