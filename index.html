<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página Inofensiva</title>
<style>
body, html {margin:0;padding:0;height:100%;overflow:hidden;background:black;font-family: monospace;color:white;}
.fakeBar {
    position: fixed;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    background:#333;
    color:white;
    padding:10px;
    border-radius:5px;
    text-align:center;
    pointer-events:none; /* não clicável */
    font-size:14px;
    z-index:10001;
}
#fakeBarTop {top:10px;}
#fakeBarMiddle {top:50%; transform: translate(-50%, -50%);}
#crashContainer {position: fixed; top:0; left:0; width:100%; height:100%; z-index:9999; pointer-events:none;}
.crashImage {position: absolute;width:50px;height:50px;opacity:0.8;transition: all 2.5s ease;}
#endCrash {position: fixed; bottom:20px; right:20px; z-index:10000; padding:15px; font-size:18px; background:red; color:white; border:none; border-radius:10px; cursor:pointer; display:none;}
</style>
</head>
<body>
<div class="fakeBar" id="fakeBarTop">www.seusitepegadinha.com</div>
<div class="fakeBar" id="fakeBarMiddle">www.seusitepegadinha.com</div>
<div id="crashContainer"></div>
<button id="endCrash">⬆ Voltar</button>
<audio id="errorSound" src="error.mp3" preload="auto"></audio>

<script>
const crashContainer = document.getElementById("crashContainer");
const endCrash = document.getElementById("endCrash");
const errorSound = document.getElementById("errorSound");

// Crash automático com efeito de “prender no site”
function crashPrank() {
    let maxImages = 50;
    for(let i=0;i<maxImages;i++){
        setTimeout(()=>{
            const img = document.createElement("img");
            img.src = "bsod.png";
            img.classList.add("crashImage");
            let size = 20 + Math.random()*30;
            img.style.width = size+"px";
            img.style.height = size+"px";
            img.style.top = Math.random()*(window.innerHeight - size) + "px";
            img.style.left = Math.random()*(window.innerWidth - size) + "px";
            crashContainer.appendChild(img);

            // áudio individual
            const audio = document.createElement("audio");
            audio.src = "error.mp3";
            audio.volume = 0.5;
            audio.play();

            // crescimento e deslocamento aleatório
            setTimeout(()=>{
                let newSize = 150 + Math.random()*200;
                img.style.width = newSize+"px";
                img.style.height = newSize+"px";
                img.style.top = Math.random()*(window.innerHeight - newSize) + "px";
                img.style.left = Math.random()*(window.innerWidth - newSize) + "px";
            },50);
        }, i*150);
    }

    // botão só aparece depois de 50 segundos
    setTimeout(()=>{ endCrash.style.display = "block"; }, 50000);
}

endCrash.addEventListener("click", ()=>{
    crashContainer.innerHTML="";
    endCrash.style.display="none";
});

// inicia pegadinha automaticamente
window.onload = crashPrank;
</script>
</body>
</html>
