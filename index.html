<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página Divertida</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:monospace;
}

#crashContainer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

.crashImage{
position:absolute;
width:40px;
height:40px;
transition:all 2s;
}

#endCrash{
position:fixed;
bottom:20px;
right:20px;
background:red;
color:white;
padding:15px;
border:none;
border-radius:10px;
display:none;
font-size:18px;
}

</style>
</head>

<body>

<div id="crashContainer"></div>

<button id="endCrash">Voltar</button>

<audio id="alerta" src="alerta_ameaca.mp3"></audio>

<script>

const container = document.getElementById("crashContainer")
const alerta = document.getElementById("alerta")
const voltar = document.getElementById("endCrash")

function iniciar(){

alerta.volume = 1
alerta.play()

let total = 50

for(let i=0;i<total;i++){

setTimeout(()=>{

let img = document.createElement("img")

img.src = "bsod.png"
img.className="crashImage"

let size = 20 + Math.random()*40

img.style.width=size+"px"
img.style.height=size+"px"

img.style.top=Math.random()*window.innerHeight+"px"
img.style.left=Math.random()*window.innerWidth+"px"

container.appendChild(img)

let som = new Audio("error.mp3")
som.volume=1
som.play()

setTimeout(()=>{

let big = 200 + Math.random()*200

img.style.width=big+"px"
img.style.height=big+"px"

},50)

}, i*150)

}

setTimeout(()=>{
voltar.style.display="block"
},50000)

}

window.onload=iniciar

voltar.onclick=()=>{
container.innerHTML=""
}

</script>

</body>
</html>
